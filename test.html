<!DOCTYPE html>
<html>
<body>
<script>
  fetch("http://localhost:3000/api/deals", { method: "POST" })
    .then(res => res.text())
    .then(text => {
      document.body.innerHTML = "<pre>" + text + "</pre>";
    })
    .catch(err => {
      document.body.innerHTML = "<pre>ERROR: " + err + "</pre>";
    });
</script>
</body>
</html>
