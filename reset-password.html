<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - QuestSave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo" style="text-decoration:none">🎮 QuestSave</a>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Set a new password</h1>
      <p style="font-size:13px;color:#888;margin-bottom:16px;">Choose a new password for your account.</p>
      <input type="password" id="new-password-input" placeholder="New password">
      <button id="update-password-btn">Update password</button>
      <p id="reset-message"></p>
      <a href="Login.html" style="font-size:13px;color:#a78bfa;display:block;margin-top:8px;text-align:center;">Back to log in</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
